      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

<style title='marimo-custom'>/* GW site tokens mapped onto marimo's semantic CSS variables.
   Used via App(css_file=...) and reinforced by scripts/inject_slides_theme.py. */

:root,
.dark,
.dark-theme,
.marimo {
  color-scheme: dark;

  --ink: #0a0e12;
  --ink-elevated: #121820;
  --ink-muted: #1a222d;
  --text: #e6ebe8;
  --text-muted: #9aa8a0;
  --text-faint: #6b7a72;
  --accent: #3dcfb6;
  --accent-dim: #2a9a88;
  --accent-glow: rgba(61, 207, 182, 0.18);
  --border-site: rgba(230, 235, 232, 0.08);

  --marimo-text-font: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
  --marimo-heading-font: "Fraunces", "Source Serif 4", Georgia, serif;
  --marimo-monospace-font: "IBM Plex Mono", ui-monospace, monospace;

  /* Override marimo light-dark() defaults toward site ink field */
  --background: var(--ink) !important;
  --foreground: var(--text) !important;
  --card: var(--ink-elevated) !important;
  --card-foreground: var(--text) !important;
  --muted: var(--ink-muted) !important;
  --muted-foreground: var(--text-muted) !important;
  --popover: var(--ink-elevated) !important;
  --popover-foreground: var(--text) !important;
  --border: var(--border-site) !important;
  --primary: var(--accent) !important;
  --primary-foreground: var(--ink) !important;
  --accent-foreground: var(--ink) !important;
  --secondary: var(--ink-muted) !important;
  --secondary-foreground: var(--text) !important;
  --cm-background: var(--ink-elevated) !important;
}

html,
body,
#root,
.marimo {
  background: var(--ink) !important;
  color: var(--text) !important;
  font-family: var(--marimo-text-font) !important;
}

h1,
h2,
h3,
h4,
h5,
h6 {
  font-family: var(--marimo-heading-font) !important;
  color: var(--text) !important;
  font-weight: 500;
}

.paragraph,
.markdown,
.prose,
.prose * {
  color: var(--text) !important;
}

a {
  color: var(--accent) !important;
}

img {
  max-width: 100%;
  height: auto;
  border-radius: 2px;
}

/* Kill residual light surfaces from marimo chrome */
.bg-background,
.bg-primary,
.bg-secondary,
.bg-card,
.bg-muted,
[class*="bg-background"],
[class*="bg-card"] {
  background-color: var(--ink) !important;
  color: var(--text) !important;
}

<script id="gw-slides-force-dark">
  // Marimo reads display.theme from the embedded config; also stamp dark classes
  // before paint so light-dark() / .dark token sheets resolve to the dark branch.
  document.documentElement.classList.add("dark", "dark-theme");
  document.documentElement.style.colorScheme = "dark";
  document.documentElement.setAttribute("data-theme", "dark");
  document.addEventListener("DOMContentLoaded", function () {
    document.body.classList.add("dark", "dark-theme");
    document.body.style.colorScheme = "dark";
    document.body.setAttribute("data-theme", "dark");
  });
</script>

: null, "disabled": false, "hide_code": false}, "id": "Hstk", "name": "_"}, {"code": "", "code_hash": "42e49132d3c14bcfe0cbbe185577e97e", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "nWHF", "name": "_"}], "metadata": {"marimo_version": "0.23.14"}, "version": "1"},
            "session": {"cells": [{"code_hash": "44a6a2f25a986503c9d61a89fa10882f", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "9cd574fbc6af215309a474ddeb87c68e", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"population-state-koopman-for-scrna-seq\"\u003EPopulation-state Koopman for scRNA-seq\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003ECross-sectional single-cell time courses do not provide persistent cell trajectories.\nThe open question is whether the \u003Cstrong\u003Epopulation distribution\u003C/strong\u003E over expression space\nstill carries enough structure to support dynamical claims.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "395c18f4eb6a05227a221ed54977531e", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"the-measurement-gap\"\u003EThe measurement gap\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EBulk RNA-seq averages cells into one vector. scRNA-seq recovers cell states after\ndissociation removes temporal identity. Pseudotime orders cells on a shared manifold,\nbut that order is not a measured trajectory of any one cell.\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EForecasting how a \u003Cem\u003Edistribution\u003C/em\u003E of states moves is a different problem from\nreconstructing individual paths. The two operate at different scales.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d1408577d0a6e88febd4459ac66cec79", "console": [], "id": "bkHC", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"observation-model-fixed-supports\"\u003EObservation model: fixed supports\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ELearn a fixed set of expression-space supports once (k-means or SEACells coarsening).\nAt each timepoint, assign cells to those supports and record:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003Eoccupancy\u003C/strong\u003E \u2014 fraction of cells on each support\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Emean PC coordinates\u003C/strong\u003E among assigned cells\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003Eobservation mask\u003C/strong\u003E \u2014 zero-cell and below-threshold supports stay masked\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe resulting object is a time-indexed \u003Cstrong\u003Epopulation state\u003C/strong\u003E, not a cell path.\nSEACells coarsens geometry; it does not pre-linearize nonlinear dynamics.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "6ec3736f4de74dcf1135799f7da613c8", "console": [], "id": "lEQa", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"schematic-fixed-supports-over-time\"\u003ESchematic: fixed supports over time\u003C/h3\u003E\u003C/span\u003E\u003Cimg src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABQsAAAKOCAYAAAABGU8mAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjEsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvctoD+AAAAAlwSFlzAAAYmwAAGJsBSXWDlAABAABJREFUeJzs3Qd4U2UXB/B/96Z0scvem7L3RkBAlmwQFAQ3TtziRAQVFAcOQD9xgLIFlCV7703Ze5TuvfI95y0JbZO0aZM0bfr/PU+eps3N7c3Nzc295573HAfPEv4aEBERERERERERUbHnWOzXABERERERERERESkMFhIREREREREREZHCYCEREREREREREREpDBYSERERERERERGRwmAhERERERERERERKQwWEhERERERERERkcJgIRERERERERERESkMFhIREREREREREZHCYCEREREREREREREpDBYSERERERERERGRwmAhERERERERERERKQwWEhERERERERERkcJgIRERERERERERESkMFhIREREREREREZHinPGDiIgKOz+/kmjQoL66v2fPPiQmJnJ5iIjIbpQuXQq1atVU97dv34m0tDQURpUqV0KlisFITk7Grl17bL04REREFsdgIREVet7e3ggJaaz3d41Gg/j4BNy5cweXL1+BvZNA4bz536n7Xbv ploratory; three FACS phases cannot identify cycle frequency\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EHagai\u003C/strong\u003E innate time course\u003C/td\u003E\n\u003Ctd\u003EEarly vs late windows under stimulation\u003C/td\u003E\n\u003Ctd\u003EPrimary real perturbation dynamics setting\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EKang\u003C/strong\u003E IFN-\u03b2 PBMC\u003C/td\u003E\n\u003Ctd\u003EControl vs stimulated concordance by lineage\u003C/td\u003E\n\u003Ctd\u003ECondition-shift validation, not autonomous \u003Cmarimo-tex class=\"arithmatex\"\u003E||(K||)\u003C/marimo-tex\u003E identification\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Cstrong\u003EEmbryoid body\u003C/strong\u003E\u003C/td\u003E\n\u003Ctd\u003EPopulation forecast and branch-local models\u003C/td\u003E\n\u003Ctd\u003EBranch models stay descriptive without correspondence\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EShared rule: compare spectra only on a matched observation basis\n(same preprocessing hash, PCA loadings, supports, feature order, and \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\Delta t||)\u003C/marimo-tex\u003E).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a29515fa8797f940e223603dbf88dffb", "console": [], "id": "Kclp", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"claim-gates-before-dynamical-language\"\u003EClaim gates before dynamical language\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EInterpretive language is gated, not aspirational:\u003C/span\u003E\n\u003Col\u003E\n\u003Cli\u003E\u003Cstrong\u003EIdentifiability\u003C/strong\u003E \u2014 enough independent transitions per window (else \u003Ccode\u003Eone_step_descriptive\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EMatched basis\u003C/strong\u003E \u2014 shared supports and preprocessing across compared segments\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EForecast skill\u003C/strong\u003E \u2014 leakage-free held-out RMSE beats persistence and rank-matched DMD\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EStability\u003C/strong\u003E \u2014 observation/replicate resampling separates sampling noise from spectral shifts\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003EConjugate pairing\u003C/strong\u003E \u2014 complex modes paired before gene interpretation; oscillation language needs correct \u003Cmarimo-tex class=\"arithmatex\"\u003E||(\\Delta t||)\u003C/marimo-tex\u003E\u003C/li\u003E\n\u003C/ol\u003E\n\u003Cspan class=\"paragraph\"\u003ESynthetic smoke confirms the pipeline. It does not license biological claims.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "a6b956ee1e9ea874768cb0aa7b6f7357", "console": [], "id": "emfo", "outputs": [{"data": {"text/html": "\u003Cdiv style='display: flex;flex: 1;flex-direction: column;justify-content: flex-start;align-items: normal;flex-wrap: nowrap;gap: 0.5rem'\u003E\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"gates-separate-description-from-prediction\"\u003EGates separate description from prediction\u003C/h3\u003E\u003C/span\u003E\u003Cimg src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA5wAAAHlCAYAAACZAPPxAAAAOnRFWHRTb2Z0d2FyZQBNYXRwbG90bGliIHZlcnNpb24zLjExLjEsIGh0dHBzOi8vbWF0cGxvdGxpYi5vcmcvctoD+AAAAAlwSFlzAAAYmwAAGJsBSXWDlAAAoe1JREFUeJzt3Qd4ZFX5x/E3vfds74Vl6Z1dWHovokgTLEhTsFAEEUQFQZQigqjoX+ydDoL03ntngV2295LdTe/l//xOcoebyUwyM5mbZDffz/OEDUlm5ra5c95z3vOelNzC0g4DAAAAACDJUpP9hAAAAAAAEHACAAAAAALDCCcAAAAAIBAEnAAAAACAQBBwAgAAAAACQcAJAAAAAAgEAScAAAAAIBAEnAAAAACAQBBwAgAAAAACQcAJAAAAAAgEAScAAAAAIBAEnAAAAACAQBBwAgAAAAACQcAJAAAAAAhEejBPi+EoMzPDtt12G/f9woWLraamptvvZ87c2rKzs2z9+gpbuXLVIG3l0NmOLWl/h9sx3dJkZ2fbzJkzrKW11eZ+8GHc57e/v0f/cYz7tv0O21l6WpqtWbPWfSX7GPM+AAbO+PHjrLy8zBoaGm3evPndfjdp0kQrKS 3E"}, "type": "data"}]}, {"code_hash": "42e49132d3c14bcfe0cbbe185577e97e", "console": [], "id": "nWHF", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"source-and-reproducibility\"\u003ESource and reproducibility\u003C/h2\u003E\n\u003Cul\u003E\n\u003Cli\u003EExperiment package: sibling repo \u003Ccode\u003EKoopmanExperimentation\u003C/code\u003E (\u003Ccode\u003Escrna_koopman\u003C/code\u003E)\u003C/li\u003E\n\u003Cli\u003ESlide source: \u003Ccode\u003Eanalysis/koopman-population-states/koopman_population_states_slides.py\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003EFigures on disk: \u003Ccode\u003EF:/GitHub/GWMcElfresh.github.io/public/slides/koopman/figures\u003C/code\u003E\u003C/li\u003E\n\u003Cli\u003ERe-export: \u003Ccode\u003Epython analysis/koopman-population-states/run.py\u003C/code\u003E\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EFigures above are \u003Cstrong\u003Eschematics\u003C/strong\u003E for the talk. Fitted spectra and claim-gate outcomes\nlive in the experiment notebooks and are evidence-tiered (\u003Ccode\u003Esynthetic_smoke\u003C/code\u003E vs\n\u003Ccode\u003Ereal_data_candidate\u003C/code\u003E).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}], "metadata": {"marimo_version": "0.23.14", "script_metadata_hash": null}, "version": "1"},
